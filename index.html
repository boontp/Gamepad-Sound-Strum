<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamepad Sound Strum v9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg: #000;
            --note-b: #00eeff;
            --grey: #222;
        }

        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }

        /* 1/3 Display Section */
        #display-section { height: 33.33vh; display: flex; flex-direction: column; border-bottom: 2px solid #333; z-index: 10; background: #000; position: relative; }
        header { height: 25%; background: #111; display: flex; align-items: center; padding: 0 10px; border-bottom: 1px solid #333; justify-content: space-between; }
        #fret-status { background: #222; padding: 2px 8px; border-radius: 4px; color: var(--note-b); font-family: monospace; font-size: 13px; }
        
        #fret-container { height: 45%; background: #050505; overflow: hidden; position: relative; border-bottom: 1px solid #444; }
        #fretboard { display: flex; position: absolute; transition: transform 0.2s ease; height: 100%; }
        .fret { min-width: 80px; border-right: 1px solid #222; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; position: relative; }
        .fret-num { position: absolute; top: 2px; font-size: 9px; opacity: 0.5; }
        .string-line { width: 100%; height: 1px; background: #333; position: relative; }
        .note-dot { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; transition: 0.1s; border: 1px solid transparent; pointer-events: none; }
        .fret-hit { opacity: 1 !important; transform: scale(1.4); background: #fff !important; border: 2px solid currentColor; font-weight: bold; z-index: 5; }

        /* Fret Highlight v7 style */
        .playable-fret { box-shadow: inset 0 0 25px rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }

        #piano-container { height: 30%; background: #111; display: flex; overflow: hidden; border-top: 1px solid #fff; }
        .piano-key { flex: 1; min-width: 40px; height: 100%; border: 5px solid transparent; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; font-size: 10px; font-weight: bold; box-sizing: border-box; }
        .white { background: #fff; color: #000; border-color: #fff; }
        .black { background: #222; color: #fff; height: 60%; z-index: 2; margin: 0 -12px; min-width: 24px; border-color: #222; }
        
        /* Piano Dynamics v9 */
        .playable-key { border-color: currentColor !important; }
        .piano-hit { background: lightgray !important; color: #000 !important; }
        .piano-hit:not(.playable-key) { border-color: lightgray !important; }

        /* 2/3 Controller Section */
        #controller-section { height: 66.66vh; display: flex; background: #0a0a0a; position: relative; overflow: hidden; }
        .ctrl-half { width: 50vw; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 10px 5px; box-sizing: border-box; }
        
        .trig-stack { width: 85%; display: flex; flex-direction: column; gap: 6px; }
        .trig-btn { height: 5.5vh; border: 2px solid #555; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #111; font-weight: bold; font-size: 13px; user-select: none; }
        .active-trig { background: #fff !important; color: #000 !important; }

        .analog-base { width: min(40vw, 180px); height: min(40vw, 180px); background: #151515; border-radius: 50%; border: 4px solid #333; position: relative; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #analog-stick { width: 40%; height: 40%; background: #fff; border-radius: 50%; position: absolute; box-shadow: 0 0 15px #fff; pointer-events: none; }

        .btn-grid { display: grid; grid-template-areas: ". tri ." "sq . cir" ". x ."; gap: 10px; }
        .joy-btn { width: min(15vw, 65px); height: min(15vw, 65px); border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; background: #111; user-select: none; }

        /* Hamburger Menu */
        #menu-panel { position: fixed; top: 0; left: -320px; width: 260px; height: 100%; background: #111; border-right: 1px solid #444; transition: 0.3s; z-index: 1000; overflow-y: auto; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #menu-panel.open { left: 0; }
        .menu-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; font-size: 13px; }
        .menu-item.active { background: #222; color: var(--note-b); border-left: 3px solid var(--note-b); }

        #vol-slider { width: 80px; accent-color: var(--note-b); }
    </style>
</head>
<body>

<div id="display-section">
    <header>
        <div id="hamburger" style="font-size:24px; cursor:pointer; padding: 5px;">☰</div>
        <div id="fret-status">FRET 0</div>
        <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.5">
    </header>
    <div id="fret-container"><div id="fretboard"></div></div>
    <div id="piano-container"></div>
</div>

<div id="controller-section">
    <div id="menu-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;">Instruments</h3>
            <span id="close-menu" style="cursor:pointer; font-size:24px;">×</span>
        </div>
        <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
        <div id="sound-list"></div>
    </div>

    <div class="ctrl-half">
        <div class="trig-stack">
            <div id="ui-L2" class="trig-btn" onpointerdown="handleExclusive('L2')">L2 (V)</div>
            <div id="ui-L1" class="trig-btn" onpointerdown="handleExclusive('L1')">L1 (C)</div>
        </div>
        <div id="analog-area" class="analog-base"><div id="analog-stick"></div></div>
    </div>

    <div class="ctrl-half">
        <div class="trig-stack">
            <div id="ui-R2" class="trig-btn" onpointerdown="handleExclusive('R2')">R2 (N)</div>
            <div id="ui-R1" class="trig-btn" onpointerdown="handleExclusive('R1')">R1 (B)</div>
        </div>
        <div class="btn-grid">
            <div class="joy-btn" style="grid-area:tri; border-color:#4ef037" onpointerdown="play(2)">△</div>
            <div class="joy-btn" style="grid-area:sq;  border-color:#e034e0" onpointerdown="play(1)">□</div>
            <div class="joy-btn" style="grid-area:cir; border-color:#f03737" onpointerdown="play(3)">○</div>
            <div class="joy-btn" style="grid-area:x;   border-color:#374bf0" onpointerdown="play(0)">✕</div>
        </div>
    </div>
</div>

<div id="start-screen" style="position:fixed; inset:0; background:#000; z-index:2000; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:20px">
    <h2 style="letter-spacing:3px">GAMEPAD SOUND STRUM</h2>
    <button onclick="init()" style="padding:15px 40px; font-size:18px; color:#fff; border:2px solid #fff; background:none; border-radius:50px;">INITIALIZE ENGINE</button>
</div>

<script>
    const COLORS = ["#e63946", "#f3722c", "#f8961e", "#f9c74f", "#d4d700", "#90be6d", "#43aa8b", "#4d908e", "#577590", "#277da1", "#480ca8", "#b5179e"];
    const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const STRINGS = [40, 45, 50, 55]; 
    
    let synth, currentFret = 0, isStarted = false, analogPointerId = null, stickPos = { x: 0, y: 0 };
    let input = { w:0, a:0, s:0, d:0 }, toggles = { L1:false, L2:false, R1:false, R2:false };

    const SOUNDS = [
        { name: "1. Fat Saw (Standard)", type: "PolySynth", opts: { oscillator: { type: "fatsawtooth" } } },
        { name: "2. Precision Bass (Clean)", type: "MonoSynth", opts: { oscillator: { type: "triangle" }, filter: { Q: 2, type: "lowpass", rolloff: -24 }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.4, release: 1 } } },
        { name: "3. FM Metal Clang", type: "FMSynth", opts: { harmonicity: 2, modulationIndex: 0.4 } },
        { name: "4. Square Lead", type: "PolySynth", opts: { oscillator: { type: "square" } } },
        { name: "5. Jazz Bass (Finger)", type: "FMSynth", opts: { harmonicity: 1, modulationIndex: 3.5, envelope: { attack: 0.01, decay: 0.3, sustain: 0.2 } } },
        { name: "6. Overdrive Guitar", type: "PolySynth", opts: { oscillator: { type: "sawtooth" }, filter: { type: "lowpass" }, distortion: 0.6, envelope: { attack: 0.01, decay: 0.2, sustain: 0.3, release: 0.5 } } },
        { name: "7. Soft Triangle", type: "PolySynth", opts: { oscillator: { type: "triangle" } } },
        { name: "8. Acoustic Bass", type: "MonoSynth", opts: { oscillator: { type: "sine" }, envelope: { attack: 0.05, decay: 0.5, sustain: 1, release: 0.8 } } },
        { name: "9. Slap Bass (Pop)", type: "MonoSynth", opts: { oscillator: { type: "square" }, filter: { type: "lowpass" }, envelope: { attack: 0.001, decay: 0.02 } } },
        { name: "10. Sine Piano", type: "PolySynth", opts: { envelope: { attack: 0.02, release: 1.5 } } }
    ];

    function init() {
        Tone.start();
        setSound(0);
        document.getElementById('vol-slider').addEventListener('input', e => Tone.Destination.volume.value = Tone.gainToDb(e.target.value));
        document.getElementById('start-screen').style.display = 'none';
        setupMultitouch();
        populateMenu();
        isStarted = true;
        loop();
    }

    function populateMenu() {
        const list = document.getElementById('sound-list');
        SOUNDS.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'menu-item' + (i===0?' active':'');
            div.innerText = s.name;
            div.onclick = () => { setSound(i); toggleMenu(false); };
            list.appendChild(div);
        });
        document.getElementById('hamburger').onclick = () => toggleMenu(true);
        document.getElementById('close-menu').onclick = () => toggleMenu(false);
    }

    function toggleMenu(open) { document.getElementById('menu-panel').classList.toggle('open', open); }

    function setSound(idx) {
        if(synth) synth.dispose();
        synth = new Tone[SOUNDS[idx].type](SOUNDS[idx].opts).toDestination();
        document.querySelectorAll('.menu-item').forEach((el, i) => el.classList.toggle('active', i===idx));
    }

    function setupMultitouch() {
        const area = document.getElementById('analog-area');
        area.onpointerdown = (e) => { analogPointerId = e.pointerId; area.setPointerCapture(e.pointerId); updateStick(e); };
        area.onpointermove = (e) => { if (e.pointerId === analogPointerId) updateStick(e); };
        area.onpointerup = area.onpointercancel = (e) => { if (e.pointerId === analogPointerId) { analogPointerId = null; stickPos = { x: 0, y: 0 }; } };
        function updateStick(e) {
            const rect = area.getBoundingClientRect();
            let dx = (e.clientX - (rect.left + rect.width/2)) / (rect.width/2);
            let dy = (e.clientY - (rect.top + rect.height/2)) / (rect.height/2);
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 1) { dx /= dist; dy /= dist; }
            stickPos = { x: dx, y: dy };
        }
    }

    // UI Builders
    const fb = document.getElementById('fretboard');
    for(let f=0; f<=22; f++){
        let div = document.createElement('div'); div.className='fret'; div.id=`fcol-${f}`;
        div.innerHTML = `<span class="fret-num">${f}</span>`;
        for(let s=3; s>=0; s--){
            let line = document.createElement('div'); line.className='string-line';
            let dot = document.createElement('div'); dot.className='note-dot';
            dot.id = `dot-${s}-${f}`;
            let m = STRINGS[s]+f;
            dot.innerText = NOTES[m%12];
            dot.style.color = COLORS[m%12];
            dot.style.opacity = NOTES[m%12].includes('#') ? "0.2" : "0.4";
            line.appendChild(dot); div.appendChild(line);
        }
        fb.appendChild(div);
    }

    const pCon = document.getElementById('piano-container');
    for(let m=40; m<=87; m++){
        let k = document.createElement('div');
        let isSharp = NOTES[m%12].includes('#');
        k.className = `piano-key ${isSharp ? 'black' : 'white'}`;
        k.id = `pk-${m}`;
        k.style.color = COLORS[m%12];
        if(!isSharp) k.innerText = `${NOTES[m%12]}${Math.floor(m/12)-1}`;
        pCon.appendChild(k);
    }

    function handleExclusive(id) {
        const current = toggles[id];
        Object.keys(toggles).forEach(k => toggles[k] = false);
        toggles[id] = !current;
    }

    window.onkeydown = e => {
        const k = e.key.toLowerCase();
        if(['w','a','s','d'].includes(k)) input[k] = 1;
        if(k==='c') handleExclusive('L1'); if(k==='v') handleExclusive('L2');
        if(k==='b') handleExclusive('R1'); if(k==='n') handleExclusive('R2');
        const pMap = {'h':0, 'j':1, 'k':2, 'l':3};
        if(pMap[k] !== undefined) play(pMap[k]);
    };
    window.onkeyup = e => { if(['w','a','s','d'].includes(e.key.toLowerCase())) input[e.key.toLowerCase()] = 0; };

    function play(sIdx) {
        if(!isStarted) return;
        const midi = STRINGS[sIdx] + currentFret;
        synth.triggerAttackRelease(Tone.Frequency(midi, "midi"), "4n");
        document.querySelectorAll('.fret-hit, .piano-hit').forEach(el => el.classList.remove('fret-hit', 'piano-hit'));
        document.getElementById(`dot-${sIdx}-${currentFret}`).classList.add('fret-hit');
        document.getElementById(`pk-${midi}`).classList.add('piano-hit');
        fb.style.transform = `translateX(-${Math.max(0, (currentFret-2)*80)}px)`;
    }

    function loop() {
        const gp = navigator.getGamepads()[0];
        let l1=toggles.L1, l2=toggles.L2, r1=toggles.R1, r2=toggles.R2, axX = 0, axY = 0;

        if(gp){
            l1=gp.buttons[4].pressed; r1=gp.buttons[5].pressed; l2=gp.buttons[6].pressed; r2=gp.buttons[7].pressed;
            axX = gp.axes[0]; axY = gp.axes[1];
            [0,1,2,3].forEach(i => { if(gp.buttons[i].pressed) play([0,3,1,2][i]); });
        } else {
            axX = (input.d - input.a) || stickPos.x;
            axY = (input.s - input.w) || stickPos.y;
        }

        // v9 Clockwise Analog Logic: Right=1, Down=2, Left=3, Up=4
        let dir = 0;
        if(Math.abs(axX) > 0.4 || Math.abs(axY) > 0.4) {
            if(Math.abs(axX) > Math.abs(axY)) dir = axX > 0 ? 1 : 3;
            else dir = axY > 0 ? 2 : 4;
        }

        document.getElementById('analog-stick').style.transform = `translate(${axX*40}px, ${axY*40}px)`;
        let base = 0, label = "O";
        if(r2) { base = 16; label = "R2"; } else if(l2) { base = 12; label = "L2"; } 
        else if(r1) { base = 8; label = "R1"; } else if(l1) { base = 4; label = "L1"; }
        
        currentFret = dir > 0 ? base + dir : 0;
        document.getElementById('fret-status').innerText = `${label} | FRET ${currentFret}`;

        document.querySelectorAll('.playable-fret, .playable-key').forEach(el => el.classList.remove('playable-fret', 'playable-key'));
        document.getElementById(`fcol-${currentFret}`).classList.add('playable-fret');
        STRINGS.forEach(s => document.getElementById(`pk-${s+currentFret}`)?.classList.add('playable-key'));

        ['L1','L2','R1','R2'].forEach(id => document.getElementById(`ui-${id}`).classList.toggle('active-trig', (id==='L1'?l1:id==='L2'?l2:id==='R1'?r1:r2)));
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
