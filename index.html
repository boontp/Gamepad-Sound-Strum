<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Gamepad Sound Strum v16</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
	<style>
		:root { --bg: #000; --note-b: #00eeff; --grey: #222; }
		body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }

		/* HEADER & EDITOR */
		#main-header { height: 35vh; display: flex; flex-direction: column; border-bottom: 2px solid #333; z-index: 100; background: #000; position: relative; }
		#status-bar { height: 40px; background: #111; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; justify-content: space-between; font-size: 11px; z-index: 101; flex-shrink: 0; }
		#fret-status { font-family: monospace; color: var(--note-b); flex-grow: 1; text-align: center; }
		
		#editor-panel { position: absolute; top: -330px; left: 0; width: 100%; height: 320px; background: #1a1a1a; transition: 0.3s ease; z-index: 99; overflow-y: auto; padding: 15px; box-sizing: border-box; border-bottom: 3px solid var(--note-b); }
		#editor-panel.open { top: 40px; }
		.editor-layout { display: flex; gap: 20px; }
		.preset-list { min-width: 150px; border-right: 1px solid #333; padding-right: 10px; }
		.preset-item { padding: 5px; font-size: 11px; cursor: pointer; border-bottom: 1px solid #222; opacity: 0.7; }
		.preset-item:hover { background: #333; opacity: 1; }
		
		.controls-area { flex-grow: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
		.control-group { background: #222; padding: 8px; border-radius: 4px; display: flex; flex-direction: column; gap: 5px; }
		.slider-row { display: flex; align-items: center; gap: 8px; }
		label { font-size: 9px; color: #888; text-transform: uppercase; }
		input[type="number"] { width: 45px; background: #000; color: var(--note-b); border: 1px solid #444; font-size: 10px; text-align: center; }
		input[type="range"] { flex-grow: 1; }
		select { background: #333; color: #fff; border: 1px solid #555; font-size: 11px; }

		/* DISPLAYS */
		#fret-container, #piano-outer { overflow: hidden; position: relative; width: 100%; border-bottom: 1px solid #444; flex-shrink: 0; }
		#fret-container { flex: 1.2; } /* Gives it slightly more room */
		#piano-outer { flex: 1; border-top: 1px solid #fff; overflow-x: auto; }
		#fretboard, #piano-container { display: flex; position: absolute; height: 100%; will-change: transform; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
		
		.fret { min-width: 80px; border-right: 1px solid #222; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; position: relative; }
		.fret-num { position: absolute; top: 2px; font-size: 9px; opacity: 0.5; }
		.string-line { width: 100%; height: 1px; background: #333; position: relative; }
		.note-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; border: 1px solid transparent; }
		.fret-hit { transform: scale(1.4); background: #fff !important; border: 2px solid currentColor; font-weight: bold; z-index: 5; }
		.playable-fret { box-shadow: inset 0 0 25px rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }

		.piano-key { min-width: 45px; height: 100%; border: 5px solid transparent; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; font-size: 10px; font-weight: bold; box-sizing: border-box; }
		.white { background: #fff; color: #000; border-color: #fff; }
		.black { background: #222; color: #fff; height: 60%; z-index: 2; margin: 0 -14px; min-width: 28px; border-color: #222; }
		.playable-key { border-color: currentColor !important; }
		.piano-hit { background: #fff !important; color: #000 !important; }

		/* TUTORIAL DISPLAY */
		#tutorial-display { height: 80px; background: #0a0a0a; display: none; flex-direction: column; justify-content: center; align-items: center; border-bottom: 2px solid #444; position: relative; flex-shrink: 0; box-shadow: inset 0 0 20px rgba(0,238,255,0.1); }
		.tab-line { width: 100%; height: 2px; background: #333; margin: 6px 0; position: relative; }
		.target-note { position: absolute; width: 22px; height: 22px; background: #000; color: var(--note-b); border: 2px solid var(--note-b); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; top: -11px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 10px var(--note-b); z-index: 10; }

		/* CONTROLLER */
		#controller-section { height: 65vh; display: flex; background: #0a0a0a; flex-grow: 1; }
		.ctrl-half { width: 50vw; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; padding: 10px; }
		.trig-btn { height: 6vh; width: 85%; border: 2px solid #555; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #111; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.1s; }
		.active-trig { background: #fff !important; color: #000 !important; border-color: #fff !important; box-shadow: 0 0 15px #fff; }

		.analog-base { width: min(42vw, 180px); height: min(42vw, 180px); background: #151515; border-radius: 50%; border: 4px solid #333; position: relative; display: flex; align-items: center; justify-content: center; touch-action: none; }
		#analog-stick { width: 40%; height: 40%; background: #fff; border-radius: 50%; position: absolute; pointer-events: none; box-shadow: 0 0 15px #fff; }

		.joy-btn { width: min(16vw, 68px); height: min(16vw, 68px); border-radius: 50%; border: 4px solid #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; background: #111; font-weight: bold; cursor: pointer; transition: 0.1s; line-height: 1.2; }
		.btn-active { background: #fff !important; color: #000 !important; transform: scale(0.9); }
	</style>
</head>
<body onpointerdown="autoInit()">

<div id="main-header">
	<div id="status-bar">
		<div id="hamburger" style="cursor:pointer; font-weight:bold;">☰ PRESETS & EDIT</div>
		<div id="fret-status">READY - TAP TO START</div>
		<div class="slider-row">
			<span style="font-size:9px;">VOL</span>
			<input type="range" id="vol-slider" min="-40" max="0" value="-10" oninput="syncVal('vol', this.value)">
			<input type="number" id="vol-num" value="-10" oninput="syncVal('vol', this.value)">
		</div>
	</div>
	
	<div id="editor-panel">
		<div class="editor-layout">
			<div class="preset-list" id="preset-list"></div>
			<div class="controls-area">
				<div class="control-group">
					<label>Synth Core</label>
					<select id="synth-type" onchange="updateSynth()">
						<option value="PolySynth">PolySynth</option>
						<option value="MonoSynth">MonoSynth</option>
						<option value="FMSynth">FMSynth</option>
					</select>
					<label>Oscillator</label>
					<select id="osc-type" onchange="updateSynth()">
						<option value="sine">Sine</option>
						<option value="square">Square</option>
						<option value="sawtooth">Sawtooth</option>
						<option value="triangle">Triangle</option>
						<option value="fatsawtooth">Fat Saw</option>
					</select>
				</div>
				<div class="control-group">
					<label>Attack (s)</label>
					<div class="slider-row">
						<input type="range" id="env-a-slider" min="0" max="2" step="0.01" oninput="syncVal('env-a', this.value)">
						<input type="number" id="env-a-num" step="0.01" oninput="syncVal('env-a', this.value)">
					</div>
					<label>Decay (s)</label>
					<div class="slider-row">
						<input type="range" id="env-d-slider" min="0.1" max="2" step="0.01" oninput="syncVal('env-d', this.value)">
						<input type="number" id="env-d-num" step="0.01" oninput="syncVal('env-d', this.value)">
					</div>
				</div>
				<div class="control-group">
					<label>Sustain (0-1)</label>
					<div class="slider-row">
						<input type="range" id="env-s-slider" min="0" max="1" step="0.05" oninput="syncVal('env-s', this.value)">
						<input type="number" id="env-s-num" step="0.05" oninput="syncVal('env-s', this.value)">
					</div>
					<label>Release (s)</label>
					<div class="slider-row">
						<input type="range" id="env-r-slider" min="0.1" max="5" step="0.1" oninput="syncVal('env-r', this.value)">
						<input type="number" id="env-r-num" step="0.1" oninput="syncVal('env-r', this.value)">
					</div>
				</div>
			</div>
		</div>
	</div>

	<div id="fret-container"><div id="fretboard"></div></div>
	<div id="piano-outer"><div id="piano-container"></div></div>
	
	<div id="tutorial-display">
		<div class="tab-line" id="tab-line-3"></div> <div class="tab-line" id="tab-line-2"></div>
		<div class="tab-line" id="tab-line-1"></div>
		<div class="tab-line" id="tab-line-0"></div> </div>
</div>

<div id="controller-section">
	<div class="ctrl-half">
		<div id="ui-L2" class="trig-btn" onpointerdown="handleTrigger('L2')">L2 (V)</div>
		<div id="ui-L1" class="trig-btn" onpointerdown="handleTrigger('L1')">L1 (C)</div>
		<div id="analog-area" class="analog-base"><div id="analog-stick"></div></div>
	</div>
	<div class="ctrl-half">
		<div id="ui-R2" class="trig-btn" onpointerdown="handleTrigger('R2')">R2 (B)</div>
		<div id="ui-R1" class="trig-btn" onpointerdown="handleTrigger('R1')">R1 (N)</div>
		<div style="display:grid; grid-template-areas:'. tri .' 'sq . cir' '. x .'; gap:10px;">
			<div class="joy-btn" id="btn-2" style="grid-area:tri;" onpointerdown="play(2)"></div>
			<div class="joy-btn" id="btn-1" style="grid-area:sq;"	onpointerdown="play(1)"></div>
			<div class="joy-btn" id="btn-3" style="grid-area:cir;" onpointerdown="play(3)"></div>
			<div class="joy-btn" id="btn-0" style="grid-area:x;"   onpointerdown="play(0)"></div> </div>
	</div>
</div>

<script>
	const COLORS = ["#e63946", "#f3722c", "#f8961e", "#f9c74f", "#d4d700", "#90be6d", "#43aa8b", "#4d908e", "#577590", "#277da1", "#480ca8", "#b5179e"];
	const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
	const STRINGS = [40, 45, 50, 55];
	const PRESETS = [
		{ name: "1. Default", type: "FMSynth", osc: "triangle", a: 0, d: 0.5, s: 0, r: 0.1 },
		{ name: "2. Fat Saw", type: "PolySynth", osc: "fatsawtooth", a: 0.01, d: 0.1, s: 0.5, r: 0.4 },
		{ name: "3. Precision Bass", type: "MonoSynth", osc: "triangle", a: 0.01, d: 0.2, s: 0.1, r: 0.2 },
		{ name: "4. FM Metal", type: "FMSynth", osc: "sine", a: 0.01, d: 0.3, s: 0.2, r: 0.8 },
		{ name: "5. Square Lead", type: "PolySynth", osc: "square", a: 0.02, d: 0.1, s: 0.6, r: 0.5 },
		{ name: "6. Jazz Bass", type: "FMSynth", osc: "sawtooth", a: 0.05, d: 0.1, s: 0.4, r: 0.2 },
		{ name: "7. Overdrive Gtr", type: "PolySynth", osc: "sawtooth", a: 0.01, d: 0.1, s: 0.8, r: 0.3 },
		{ name: "8. Soft Triangle", type: "PolySynth", osc: "triangle", a: 0.2, d: 0.4, s: 0.5, r: 1.0 },
		{ name: "9. Acoustic Bass", type: "MonoSynth", osc: "sine", a: 0.02, d: 0.8, s: 0, r: 0.8 },
		{ name: "10. Dist Slap", type: "MonoSynth", osc: "square", a: 0.001, d: 0.1, s: 0.1, r: 0.1 }
	];

	let synth, currentFret = 0, visualFret = 0, isStarted = false, lastNote = "-", isMobile = false;
	let input = { w:0, a:0, s:0, d:0 }, toggles = { L1:false, L2:false, R1:false, R2:false }, stickPos = {x:0, y:0};
	let centerStartTime = Date.now();
	
	// Tutorial Mode Variables
	let isTutorialMode = false;
	let targetNote = { string: 0, fret: 0 };

	function autoInit() {
		if(isStarted) return;
		Tone.start();
		isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth < 600;
		buildUI();
		loadPreset(0);
		isStarted = true;
		loop();
	}

	function buildUI() {
		const fb = document.getElementById('fretboard');
		const dots = [3, 5, 7, 9, 15, 17, 19, 21];
		for(let f=0; f<=22; f++){
			let d = document.createElement('div'); d.className='fret'; d.id=`fcol-${f}`;
			d.innerHTML = `<span class="fret-num">${f}</span>`;
			STRINGS.slice().reverse().forEach((sVal, sIdx) => {
				let m = sVal+f;
				let dot = document.createElement('div'); dot.className = `note-dot`; dot.id = `dot-${3-sIdx}-${f}`;
				dot.innerText = NOTES[m%12]; dot.style.color = COLORS[m%12];
				let line = document.createElement('div'); line.className='string-line';
				line.appendChild(dot); d.appendChild(line);
			});
			fb.appendChild(d);
		}

		const pc = document.getElementById('piano-container');
		for(let m=40; m<=132; m++){
			let k = document.createElement('div');
			let isS = NOTES[m%12].includes('#');
			k.className = `piano-key ${isS ? 'black' : 'white'}`;
			k.id = `pk-${m}`; k.style.color = COLORS[m%12];
			if(!isS) k.innerText = NOTES[m%12] + (Math.floor(m/12)-1);
			pc.appendChild(k);
		}

		const pList = document.getElementById('preset-list');
		
		// ADD TUTORIAL TOGGLE BUTTON
		const tutBtn = document.createElement('div');
		tutBtn.className = 'preset-item';
		tutBtn.id = 'tut-toggle-btn';
		tutBtn.style.cssText = 'color: var(--note-b); font-weight: bold; border-bottom: 2px solid #444; margin-bottom: 5px; text-align: center;';
		tutBtn.innerText = '🎸 START TUTORIAL';
		tutBtn.onclick = toggleTutorial;
		pList.appendChild(tutBtn);

		PRESETS.forEach((p, i) => {
			const div = document.createElement('div');
			div.className = 'preset-item';
			div.innerText = p.name;
			div.onclick = () => loadPreset(i);
			pList.appendChild(div);
		});

		document.getElementById('hamburger').onclick = () => document.getElementById('editor-panel').classList.toggle('open');
		setupAnalog();
	}

	function toggleTutorial() {
		isTutorialMode = !isTutorialMode;
		const display = document.getElementById('tutorial-display');
		const btn = document.getElementById('tut-toggle-btn');
		
		if (isTutorialMode) {
			display.style.display = 'flex';
			btn.innerText = '🛑 STOP TUTORIAL';
			btn.style.color = '#ff0055';
			generateTargetNote();
			document.getElementById('editor-panel').classList.remove('open'); // Close menu to show tab
		} else {
			display.style.display = 'none';
			btn.innerText = '🎸 START TUTORIAL';
			btn.style.color = 'var(--note-b)';
		}
	}

	function generateTargetNote() {
		const rFret = Math.random();
		if (rFret < 0.65) targetNote.fret = Math.floor(Math.random() * 7); // 0-6
		else if (rFret < 0.80) targetNote.fret = 7 + Math.floor(Math.random() * 4); // 7-10
		else if (rFret < 0.95) targetNote.fret = 11 + Math.floor(Math.random() * 6); // 11-16
		else targetNote.fret = 17 + Math.floor(Math.random() * 4); // 17-20

		const rLine = Math.random();
		if (rLine < 0.40) targetNote.string = 0; // Line 1
		else if (rLine < 0.75) targetNote.string = 1; // Line 2
		else if (rLine < 0.90) targetNote.string = 2; // Line 3
		else targetNote.string = 3; // Line 4

		// Clear existing notes
		document.querySelectorAll('.target-note').forEach(e => e.remove());

		// Add new note to the correct string line
		const noteEl = document.createElement('div');
		noteEl.className = 'target-note';
		noteEl.innerText = targetNote.fret;
		document.getElementById(`tab-line-${targetNote.string}`).appendChild(noteEl);
	}

	function syncVal(id, val) {
		if(id === 'vol') {
			Tone.Destination.volume.value = val;
			document.getElementById('vol-slider').value = val;
			document.getElementById('vol-num').value = val;
		} else {
			document.getElementById(`${id}-slider`).value = val;
			document.getElementById(`${id}-num`).value = val;
			updateSynth();
		}
	}

	function loadPreset(idx) {
		const p = PRESETS[idx];
		document.getElementById('synth-type').value = p.type;
		document.getElementById('osc-type').value = p.osc;
		document.getElementById('env-a-slider').value = p.a; document.getElementById('env-a-num').value = p.a;
		document.getElementById('env-d-slider').value = p.d; document.getElementById('env-d-num').value = p.d;
		document.getElementById('env-s-slider').value = p.s; document.getElementById('env-s-num').value = p.s;
		document.getElementById('env-r-slider').value = p.r; document.getElementById('env-r-num').value = p.r;
		updateSynth();
	}

	function updateSynth() {
		if(synth) synth.dispose();
		const type = document.getElementById('synth-type').value;
		const osc = document.getElementById('osc-type').value;
		const env = {
			attack: parseFloat(document.getElementById('env-a-num').value),
			decay: parseFloat(document.getElementById('env-d-num').value),
			sustain: parseFloat(document.getElementById('env-s-num').value),
			release: parseFloat(document.getElementById('env-r-num').value)
		};
		
		// Fix for Tone.js Synth Instantiation
		if (type === "PolySynth") {
			synth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: osc }, envelope: env }).toDestination();
		} else {
			synth = new Tone[type]({ oscillator: { type: osc }, envelope: env }).toDestination();
		}
	}

	function handleTrigger(id) {
		const active = !toggles[id];
		Object.keys(toggles).forEach(k => toggles[k] = false);
		toggles[id] = active;
	}

	function setupAnalog() {
		const area = document.getElementById('analog-area');
		const handleMove = (e) => {
			const r = area.getBoundingClientRect();
			stickPos.x = (e.clientX - (r.left + r.width/2)) / (r.width/2);
			stickPos.y = (e.clientY - (r.top + r.height/2)) / (r.height/2);
		};
		area.onpointerdown = (e) => { area.setPointerCapture(e.pointerId); handleMove(e); };
		area.onpointermove = (e) => { if(e.buttons) handleMove(e); };
		area.onpointerup = () => stickPos = {x:0, y:0};
	}

	function play(sIdx) {
		if(!isStarted || !synth) return;
		
		// --- TUTORIAL LOGIC CHECK ---
		if (isTutorialMode) {
			if (sIdx === targetNote.string && currentFret === targetNote.fret) {
				// Correct Note! Small delay then spawn the next one.
				document.querySelector('.target-note').style.background = '#fff';
				document.querySelector('.target-note').style.color = '#000';
				setTimeout(generateTargetNote, 200); 
			}
		}

		const midi = STRINGS[sIdx] + currentFret;
		lastNote = NOTES[midi%12] + (Math.floor(midi/12)-1);
		synth.triggerAttackRelease(Tone.Frequency(midi, "midi"), "4n");
		
		document.querySelectorAll('.fret-hit, .piano-hit').forEach(el => el.classList.remove('fret-hit', 'piano-hit'));
		document.getElementById(`dot-${sIdx}-${currentFret}`).classList.add('fret-hit');
		document.getElementById(`pk-${midi}`).classList.add('piano-hit');
		const btn = document.getElementById(`btn-${sIdx}`);
		btn.classList.add('btn-active');
		setTimeout(() => btn.classList.remove('btn-active'), 100);
	}

	function loop() {
		const gp = navigator.getGamepads()[0];
		let axX = (input.d - input.a) || stickPos.x, axY = (input.s - input.w) || stickPos.y;
		let l1=toggles.L1, l2=toggles.L2, r1=toggles.R1, r2=toggles.R2, mode = isMobile ? "MOBILE" : "PC";

		if(gp) {
			mode = "CONTROLLER"; axX = gp.axes[0]; axY = gp.axes[1];
			l1 = l1 || gp.buttons[4].pressed; r1 = r1 || gp.buttons[5].pressed; 
			l2 = l2 || gp.buttons[6].pressed; r2 = r2 || gp.buttons[7].pressed;
			[0,1,2,3].forEach(i => { if(gp.buttons[i].pressed) play([0,3,1,2][i]); });
		}

		let dir = 0;
		if(Math.abs(axX) > 0.4 || Math.abs(axY) > 0.4) {
			if(Math.abs(axX) > Math.abs(axY)) dir = axX > 0 ? 1 : 3;
			else dir = axY > 0 ? 2 : 4;
			centerStartTime = 0;
		} else if(!centerStartTime) {
			centerStartTime = Date.now();
		}

		let base = 0, modL = "OPEN";
		if(r2) { base=16; modL="R2"; } else if(l2) { base=12; modL="L2"; } else if(r1) { base=8; modL="R1"; } else if(l1) { base=4; modL="L1"; }
		currentFret = dir > 0 ? base + dir : base; 
		
		if (dir > 0 || !isStarted) { visualFret = currentFret; }
		else if ((l1||l2||r1||r2) && (Date.now() - centerStartTime < 10000)) { /* Keep visual */ }
		else { visualFret = 0; }

		const sw = window.innerWidth;
		const fb = document.getElementById('fretboard');
		fb.style.transform = `translateX(${Math.max(-(fb.offsetWidth - sw), Math.min(0, -(visualFret * 80) + (sw/4)))}px)`;
		
		if(isMobile) {
			const keyEl = document.getElementById(`pk-${STRINGS[0]+visualFret}`);
			if(keyEl) document.getElementById('piano-container').style.transform = `translateX(${Math.max(-(document.getElementById('piano-container').offsetWidth - sw), Math.min(0, -keyEl.offsetLeft + (sw/4)))}px)`;
		} else {
			document.getElementById('piano-container').style.transform = `translateX(0px)`;
		}

		[0,1,2,3].forEach(i => {
			const m = STRINGS[i] + currentFret;
			const btn = document.getElementById(`btn-${i}`);
			btn.style.borderColor = COLORS[m%12];
			btn.innerHTML = (mode==="PC") ? `<span style="opacity:0.5">[${['H','J','K','L'][i]}]</span><br>${NOTES[m%12]}${Math.floor(m/12)-1}` : `${NOTES[m%12]}${Math.floor(m/12)-1}`;
		});

		document.getElementById('fret-status').innerText = `${mode} | FRET ${currentFret} | ${lastNote}`;
		document.getElementById('analog-stick').style.transform = `translate(${axX*40}px, ${axY*40}px)`;
		document.querySelectorAll('.playable-fret, .playable-key').forEach(el => el.classList.remove('playable-fret', 'playable-key'));
		document.getElementById(`fcol-${visualFret}`).classList.add('playable-fret');
		STRINGS.forEach(s => document.getElementById(`pk-${s+visualFret}`)?.classList.add('playable-key'));
		
		// Fix for button lighting up
		['L1','L2','R1','R2'].forEach(id => document.getElementById(`ui-${id}`).classList.toggle('active-trig', (id==='L1'?l1:id==='L2'?l2:id==='R1'?r1:r2)));
		
		requestAnimationFrame(loop);
	}

	window.onkeydown = e => {
		const k = e.key.toLowerCase();
		if(['w','a','s','d'].includes(k)) input[k] = 1;
		if(k==='c') handleTrigger('L1'); if(k==='v') handleTrigger('L2');
		if(k==='n') handleTrigger('R1'); if(k==='b') handleTrigger('R2');
		const m = {'h':0, 'j':1, 'k':2, 'l':3}; if(m[k]!==undefined) play(m[k]);
	};
	window.onkeyup = e => { if(['w','a','s','d'].includes(e.key.toLowerCase())) input[e.key.toLowerCase()] = 0; };
</script>
</body>
</html>
